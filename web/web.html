<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XNEO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0D0D0D;
            color: white;
            min-height: 100vh;
            padding-bottom: 65px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 16px;
            background: #0D0D0D;
            border-bottom: 1px solid #2A2A2A;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { font-size: 26px; font-weight: bold; text-align: center; }
        .logo .x { color: #E53935; }
        .logo .neo { color: white; }
        .btn-upload {
            position: absolute;
            right: 16px;
            background: #E53935;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 10px 8px; 
        }
        .video-card {
            background: #1A1A2E;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .video-card:active { transform: scale(0.97); }
        .thumbnail {
            aspect-ratio: 16/10;
            background: #2A2A2E;
            position: relative;
            overflow: hidden;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .no-thumb {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 36px;
            color: #555;
        }
        .quality {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #E53935;
            color: white;
            font-size: 9px;
            padding: 3px 7px;
            border-radius: 4px;
            font-weight: bold;
        }
        .duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 4px;
        }
        .video-info { padding: 8px 10px 10px; }
        .video-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .uploader {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 6px;
        }
        .avatar-small {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #E53935;
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .avatar-small img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .uploader span {
            font-size: 11px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stats {
            font-size: 10px;
            color: #777;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .stats span { white-space: nowrap; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #0D0D0D;
            border-top: 1px solid #2A2A2A;
            z-index: 10;
        }
        .bottom-nav button {
            flex: 1;
            background: transparent;
            color: #888;
            border: none;
            padding: 10px 8px 8px;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .bottom-nav button.active { color: #E53935; }
        .bottom-nav button .icon { font-size: 22px; }
        .content { display: none; }
        .content.active { display: block; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            grid-column: span 2;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
            grid-column: span 2;
        }
        .profile-header {
            text-align: center;
            padding: 30px 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #E53935;
            color: white;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 12px;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .category-tag {
            display: inline-block;
            background: rgba(229,57,53,0.15);
            color: #E53935;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 8px;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #E53935;
            color: #E53935;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
        }
        h3 { padding: 16px 16px 8px; font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span class="x">X</span><span class="neo">NEO</span></div>
        <a href="upload.html" class="btn-upload">+ Subir</a>
    </header>
    
    <!-- INICIO -->
    <div id="home-content" class="content active">
        <div class="grid" id="video-grid"><div class="loading">Cargando videos...</div></div>
    </div>
    
    <!-- MI PERFIL -->
    <div id="profile-content" class="content">
        <div class="profile-header">
            <div class="avatar" id="profile-avatar">U</div>
            <h2 id="profile-username" style="margin:4px 0">Usuario</h2>
            <p style="color:#888;font-size:13px" id="profile-info"></p>
            <div class="category-tag" id="profile-category">Hetero</div>
            <br>
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
        <h3>Mis Videos</h3>
        <div class="grid" id="my-videos"><div class="loading">Cargando...</div></div>
    </div>
    
    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bottom-nav">
        <button class="active" onclick="switchPage('home')">
            <span class="icon">🏠</span>Inicio
        </button>
        <button onclick="switchPage('profile')">
            <span class="icon">👤</span>Mi Perfil
        </button>
    </nav>
    
    <script>
        const API = 'https://xneo-web.onrender.com';
        const token = localStorage.getItem('token');
        let videos = [];
        
        // Redirigir a auth si no hay sesión
        if (!token) {
            window.location.href = 'auth.html';
        }
        
        // ==================== NAVEGACIÓN ====================
        function switchPage(page) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(page + '-content').classList.add('active');
            event.target.classList.add('active');
            
            if (page === 'home') loadVideos();
            if (page === 'profile') loadProfile();
        }
        
        // ==================== FORMATO ====================
        function formatDuration(s) {
            const min = Math.floor(s / 60);
            const sec = s % 60;
            return min + ':' + sec.toString().padStart(2, '0');
        }
        function formatNumber(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n.toString();
        }
        function formatTimeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = (new Date() - new Date(dateStr)) / 1000;
            if (diff < 60) return 'Hace instantes';
            if (diff == 60) return 'Hace 1 minuto';
            if (diff < 3600) return 'Hace ' + Math.floor(diff/60) + ' minutos';
            if (diff < 7200) return 'Hace 1 hora';
            if (diff < 86400) return 'Hace ' + Math.floor(diff/3600) + ' horas';
            if (diff < 172800) return 'Hace 1 día';
            if (diff < 604800) return 'Hace ' + Math.floor(diff/86400) + ' días';
            return 'Hace ' + Math.floor(diff/604800) + ' semanas';
        }
        
        // ==================== VIDEOS ====================
        async function loadVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="loading">Cargando videos...</div>';
            
            try {
                const res = await fetch(API + '/api/videos', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (res.ok) {
                    videos = await res.json();
                    if (videos.length === 0) {
                        grid.innerHTML = '<div class="empty">📹 No hay videos aún</div>';
                    } else {
                        grid.innerHTML = videos.map(v => `
                            <div class="video-card" onclick="openVideo('${v.id}')">
                                <div class="thumbnail">
                                    ${v.thumbnail ? `<img src="${v.thumbnail}" alt="${v.title}">` : '<div class="no-thumb">▶️</div>'}
                                    <span class="quality">HD</span>
                                    <span class="duration">${formatDuration(v.duration || 0)}</span>
                                </div>
                                <div class="video-info">
                                    <div class="video-title">${v.title || 'Sin título'}</div>
                                    <div class="uploader">
                                        <div class="avatar-small">${v.uploaderAvatar ? `<img src="${v.uploaderAvatar}">` : (v.uploaderName || 'U')[0]}</div>
                                        <span>${v.uploaderName || 'Usuario'}</span>
                                    </div>
                                    <div class="stats">
                                        <span>👁 ${formatNumber(v.views || 0)}</span>
                                        <span>·</span>
                                        <span>${formatTimeAgo(v.uploadDate)}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) {
                grid.innerHTML = '<div class="loading">Error al cargar videos</div>';
            }
        }
        
        function openVideo(id) {
            const v = videos.find(v => v.id === id);
            if (v) {
                localStorage.setItem('currentVideo', JSON.stringify(v));
                window.location.href = 'play.html';
            }
        }
        
        // ==================== PERFIL ====================
        async function loadProfile() {
            try {
                const res = await fetch(API + '/api/auth/me', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('profile-username').textContent = user.username || 'Usuario';
                    document.getElementById('profile-info').textContent = user.info || '';
                    document.getElementById('profile-category').textContent = 'Categoría: ' + (user.category || 'Hetero');
                    
                    const avatar = document.getElementById('profile-avatar');
                    if (user.avatar) {
                        avatar.innerHTML = `<img src="${user.avatar}">`;
                    } else {
                        avatar.textContent = (user.username || 'U')[0].toUpperCase();
                    }
                }
            } catch(e) {}
            
            try {
                const res = await fetch(API + '/api/videos/mine', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const myGrid = document.getElementById('my-videos');
                if (res.ok) {
                    const myVideos = await res.json();
                    if (myVideos.length === 0) {
                        myGrid.innerHTML = '<div class="empty">No has subido videos aún</div>';
                    } else {
                        myGrid.innerHTML = myVideos.map(v => `
                            <div class="video-card" onclick="openVideo('${v.id}')">
                                <div class="thumbnail">
                                    ${v.thumbnail ? `<img src="${v.thumbnail}">` : '<div class="no-thumb">▶️</div>'}
                                    <span class="duration">${formatDuration(v.duration || 0)}</span>
                                </div>
                                <div class="video-info">
                                    <div class="video-title">${v.title || ''}</div>
                                    <div class="stats">
                                        <span>👁 ${formatNumber(v.views || 0)}</span>
                                        <span>·</span>
                                        <span>👍 ${formatNumber(v.likes || 0)}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) {}
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'auth.html';
        }
        
        // Cargar al iniciar
        loadVideos();
    </script>
</body>
</html>
