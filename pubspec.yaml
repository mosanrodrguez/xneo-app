name: xneo_app
description: XNEO - Videos exclusivos
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  video_player: ^2.8.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  file_picker: ^5.5.0
  path_provider: ^2.1.0
  share_plus: ^7.2.0
  permission_handler: ^11.0.0
  flutter_cache_manager: ^3.3.0
  timeago: ^3.6.0
  url_launcher: ^6.2.0
  uuid: ^4.2.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
