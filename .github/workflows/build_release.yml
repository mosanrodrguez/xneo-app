name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK per ABI
      run: flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi
    
    - name: Build AppBundle
      run: flutter build appbundle --release --target-platform android-arm,android-arm64
    
    - name: Upload armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: xneo-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    
    - name: Upload arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: xneo-arm64-v8a
        path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    
    - name: Upload AppBundle
      uses: actions/upload-artifact@v4
      with:
        name: xneo-aab
        path: build/app/outputs/bundle/release/app-release.aab
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          build/app/outputs/bundle/release/app-release.aab
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
